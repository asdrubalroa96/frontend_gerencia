services:
  - type: web
    name: seniat-frontend
    env: static
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # URL pública del backend en Render, ej: https://seniat-backend.onrender.com
      - key: VITE_API_BASE_URL
        sync: false

